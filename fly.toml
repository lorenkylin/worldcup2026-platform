# v0.13.0 Fly.io deploy config
# PyYAML 解析约束: 全部用冒号语法 (避免 = + 引号 + 中文注释的解析 bug)
# Fly.io 文档标准也是冒号风格

# App 名 (小写, 无下划线, Fly 限制)
app: "wc2026-fifa-platform"

# 主区域 hkg 香港 离中国用户最近
# Fly 免费 tier 允许 3 个 shared-cpu-1x 256MB 实例 + 1GB 持久卷
primary_region: "hkg"

# 构建 复用 v0.12 Dockerfile
build:
  dockerfile: "Dockerfile"

# 环境变量
env:
  # 数据目录挂载点 (与 mounts 一致)
  DATA_DIR: "/data"
  # Python 不缓冲 stdout 日志立即可见
  PYTHONUNBUFFERED: "1"
  # 关闭 FastAPI docs 生产环境
  APP_DEBUG: "false"

# 进程定义 单实例 web 进程
# scheduler 在 lifespan startup 自动启动 必须 1 实例防重复同步
processes:
  web: "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

# 持久卷 1GB SQLite + sync_status.json
mounts:
  - source: "wc2026_data"
    destination: "/data"

# HTTP 服务
services:
  - protocol: "tcp"
    internal_port: 8000

    # 外部端口 (HTTP/HTTPS 自动)
    ports:
      - port: 80
        handlers: ["http"]
        force_https: true
      - port: 443
        handlers: ["tls", "http"]

    # 并发控制
    concurrency:
      type: "connections"
      hard_limit: 50
      soft_limit: 25

    # 健康检查 Fly 自动重启失败实例
    tcp_checks:
      - interval: "15s"
        timeout: "2s"
        grace_period: "30s"

    http_checks:
      - interval: "30s"
        timeout: "5s"
        grace_period: "40s"
        method: "get"
        path: "/health"

# 部署配置
deploy:
  # 发布前跑 alembic 迁移 主人应先在本地 alembic upgrade head 验证
  release_command: "alembic upgrade head"
  # 部署策略 rolling 减少 downtime
  strategy: "rolling"
