# v0.13.0 — GitHub Actions CI
# 用途: push / PR 自动跑 lint + 核心测试；E2E / 慢测试独立 job 可选触发
# 主人需在 GitHub repo Settings → Secrets 加:
#   - ADMIN_TOKEN: 部署用 (本地 .env 同名)
#
# 触发: push master / push PR / manual workflow_dispatch

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:  # 主人手动跑

jobs:
  test:
    name: 核心测试（非 slow、非 E2E）
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查 import (sanity check)
        run: |
          python -c "from app.main import app; print('app:', app.title, 'v', app.version)"

      - name: 跑核心测试
        run: |
          pytest tests/ -m "not slow and not e2e" -v --tb=short -p no:cacheprovider

      - name: "跑 alembic 迁移 (干跑 --sql 只生成不执行)"
        run: |
          # 不执行实际迁移, 只验证迁移脚本可解析
          alembic upgrade head --sql 2>&1 | head -50

  slow:
    name: 慢测试（walkforward / 模拟 / 大扫描）
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 跑慢测试
        run: |
          pytest tests/ -m "slow" -v --tb=short -p no:cacheprovider

  e2e:
    name: E2E 测试（Playwright + 本地服务）
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: 初始化测试数据库
        run: |
          python data/seed.py
        env:
          DATA_DIR: "./data"

      - name: 启动服务并跑 E2E 测试
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8000/health >/dev/null && break
            sleep 1
          done
          pytest tests/e2e -v --tb=short -p no:cacheprovider
        env:
          DATA_DIR: "./data"
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN || 'ci-admin-token' }}

  lint:
    name: 语法 + 风格 (lightweight)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 编译所有 .py 文件
        run: |
          python -m compileall -q app/ tests/ scripts/ || exit 1

      - name: bash 脚本语法
        run: |
          bash -n deploy.sh
          echo "deploy.sh OK"

      - name: Dockerfile 存在性
        run: |
          test -f Dockerfile && echo "Dockerfile OK"
          test -f docker-compose.yml && echo "compose OK"
          test -f .dockerignore && echo ".dockerignore OK"
