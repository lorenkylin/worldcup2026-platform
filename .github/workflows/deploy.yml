# v0.16.1 — Fly.io 自动部署
# 触发: push tag v* (例如 git tag v0.16.1 && git push origin v0.16.1)
#
# 主人需在 GitHub repo Settings → Secrets and variables → Actions 添加:
#   - FLY_API_TOKEN: Fly.io 访问令牌 (Read/Write 权限)
#
# 可选: 在 Settings → Environments 创建 "production" 环境并设置审批人,
#       这样自动部署前需要手动确认。

name: Deploy to Fly.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 也支持手动触发

jobs:
  test:
    name: 部署前测试 gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查 import 与版本
        run: |
          python -c "from app.main import app; print('app:', app.title, 'v', app.version)"

      - name: 跑核心测试
        run: |
          pytest tests/ -m "not slow and not e2e" -v --tb=short -p no:cacheprovider

      - name: Alembic 迁移干跑验证
        run: |
          export DATABASE_URL="sqlite:///./tmp_alembic_deploy.db"
          python - <<'PY'
          from app.db import engine, Base
          Base.metadata.create_all(bind=engine)
          PY
          alembic upgrade head --sql 2>&1 | head -50
          rm -f ./tmp_alembic_deploy.db

  deploy:
    name: 部署到 Fly.io
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    environment: production  # 若未配置环境则自动跳过审批；配置后可加人工 gate

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: 部署到 Fly.io
        run: |
          echo "deploy tag: ${{ github.ref_name }}"
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 健康检查
        run: |
          for i in $(seq 1 12); do
            if curl -s -f https://wc2026-fifa-platform.fly.dev/health > /dev/null 2>&1; then
              echo "✅ 健康检查通过"
              exit 0
            fi
            echo "... attempt $i/12 ($((i*5))s)"
            sleep 5
          done
          echo "❌ 60s 健康检查超时"
          exit 1
